<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Interativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="pokedex.css" />
</head>
<body>

  <header class="header" role="banner">
    <div class="header__inner">
      <div class="header__logo" aria-label="Pokédex Logo">
        <span class="header__logo-icon" aria-hidden="true">◎</span>
        <h1 class="header__title">Pokédex</h1>
      </div>
      <p class="header__subtitle">Explore o mundo dos Pokémon</p>
    </div>
    <nav class="header__nav" role="navigation" aria-label="Navegação principal">
      <a class="header__nav-btn header__nav-btn--active" href="index.html" aria-current="page">
        <span class="header__nav-icon">◎</span><span>Pokédex</span>
      </a>
      <a class="header__nav-btn" href="diario.html">
        <span class="header__nav-icon">🎮</span><span>Pokédle</span>
      </a>
    </nav>
    <div class="header__decoration" aria-hidden="true"><div class="header__ball"></div></div>
  </header>

  <main class="main" id="main-content">

    <section class="search" aria-label="Busca de Pokémon">
      <div class="search__container">
        <form class="search__form" id="search-form" role="search" novalidate>
          <label class="search__label" for="search-input">Nome ou número do Pokémon</label>
          <div class="search__field">
            <input class="search__input" type="search" id="search-input" name="pokemon"
              placeholder="Ex: pikachu ou 25" autocomplete="off" autocorrect="off"
              autocapitalize="off" spellcheck="false"
              aria-label="Digite o nome ou número do Pokémon" aria-describedby="search-hint" />
            <button class="search__btn" type="submit" aria-label="Buscar Pokémon">
              <span class="search__btn-icon" aria-hidden="true">⊙</span>
              <span class="search__btn-text">Buscar</span>
            </button>
          </div>
          <p class="search__hint" id="search-hint">
            Tente:
            <button type="button" class="search__suggestion" data-name="pikachu">Pikachu</button>,
            <button type="button" class="search__suggestion" data-name="charizard">Charizard</button>,
            <button type="button" class="search__suggestion" data-name="mewtwo">Mewtwo</button>
          </p>
        </form>
      </div>
    </section>

    <section class="error" id="error-section" aria-live="assertive" aria-atomic="true" hidden>
      <div class="error__box">
        <span class="error__icon" aria-hidden="true">✕</span>
        <p class="error__message" id="error-message"></p>
        <button class="error__close" id="error-close">Fechar</button>
      </div>
    </section>

    <section class="modal" id="detail-modal" role="dialog" aria-modal="true" aria-labelledby="modal-pokemon-name" hidden>
      <div class="modal__backdrop" id="modal-backdrop" aria-hidden="true"></div>
      <div class="modal__panel">
        <button class="modal__close" id="modal-close" aria-label="Fechar">✕</button>
        <div class="modal__header" id="modal-header">
          <div class="modal__meta">
            <span class="modal__number" id="modal-number"></span>
            <h2 class="modal__name" id="modal-pokemon-name"></h2>
            <div class="modal__types" id="modal-types"></div>
          </div>
          <div class="modal__image-wrap">
            <img class="modal__image" id="modal-image" src="" alt="" />
          </div>
        </div>
        <div class="modal__body">
          <div class="modal__stats">
            <div class="modal__stat">
              <span class="modal__stat-icon" aria-hidden="true">↕</span>
              <div><span class="modal__stat-label">Altura</span><span class="modal__stat-value" id="modal-height"></span></div>
            </div>
            <div class="modal__stat">
              <span class="modal__stat-icon" aria-hidden="true">⚖</span>
              <div><span class="modal__stat-label">Peso</span><span class="modal__stat-value" id="modal-weight"></span></div>
            </div>
          </div>
          <div class="modal__abilities">
            <h3 class="modal__section-title">Habilidades</h3>
            <ul class="modal__ability-list" id="modal-abilities"></ul>
          </div>
          <div class="modal__base-stats">
            <h3 class="modal__section-title">Estatísticas Base</h3>
            <ul class="modal__bars" id="modal-bars"></ul>
          </div>
        </div>
      </div>
    </section>

    <div class="loader" id="loader" aria-live="polite" hidden>
      <div class="loader__ball" aria-hidden="true"></div>
      <p class="loader__text">Carregando...</p>
    </div>

    <section class="grid-section" aria-label="Lista de Pokémon">
      <div class="grid-section__header">
        <p class="grid-section__count" id="grid-count" aria-live="polite"></p>
      </div>
      <div class="pokemon-grid" id="pokemon-grid" role="list"></div>
      <div class="load-more" id="load-more-section">
        <button class="load-more__btn" id="load-more-btn">Carregar mais Pokémon</button>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <p class="footer__text">
      Dados fornecidos pela <a href="https://pokeapi.co" target="_blank" rel="noopener noreferrer" class="footer__link">PokéAPI</a>
      &nbsp;·&nbsp; Pokémon e seus nomes são marcas registradas da Nintendo.
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
