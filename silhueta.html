<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédle Silhueta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header" role="banner">
    <div class="header__inner">
      <div class="header__logo" aria-label="Pokédex Logo">
        <span class="header__logo-icon" aria-hidden="true">◎</span>
        <h1 class="header__title">Pokédex</h1>
      </div>
      <p class="header__subtitle">Quem é esse Pokémon?</p>
    </div>
    <nav class="header__nav" role="navigation" aria-label="Navegação principal">
      <a class="header__nav-btn" href="index.html">
        <span class="header__nav-icon">◎</span><span>Pokédex</span>
      </a>
      <a class="header__nav-btn header__nav-btn--active" href="diario.html" aria-current="page">
        <span class="header__nav-icon">🎮</span><span>Pokédle</span>
      </a>
    </nav>
    <div class="header__decoration" aria-hidden="true"><div class="header__ball"></div></div>
  </header>

  <nav class="subnav" role="tablist" aria-label="Modos de jogo">
    <a class="subnav__tab"                     href="diario.html"              >📅 Diário</a>
    <a class="subnav__tab"                     href="infinito.html"            >♾ Infinito</a>
    <a class="subnav__tab subnav__tab--active" href="silhueta.html" aria-current="page">👤 Silhueta</a>
  </nav>

  <div class="dle-panel">

    <div class="dle-header">
      <h2 class="dle-title">Quem é esse Pokémon?</h2>
      <p class="dle-subtitle">Reconheça o Pokémon pela silhueta!</p>
      <div class="streak-display">
        <div class="streak-item streak-item--fire">
          <span class="streak-value" id="sil-wins">0</span>
          <span class="streak-label">🏆 Acertos</span>
        </div>
        <div class="streak-item">
          <span class="streak-value" id="sil-played">0</span>
          <span class="streak-label">🎮 Jogados</span>
        </div>
      </div>
    </div>

    <div class="sil-stage">
      <div class="sil-image-wrap">
        <img class="sil-image" id="sil-image" src="" alt="Silhueta do Pokémon" />
      </div>
      <div class="sil-hint-bar">
        <span class="sil-hint" id="sil-hint-type"   hidden></span>
        <span class="sil-hint" id="sil-hint-gen"    hidden></span>
        <span class="sil-hint" id="sil-hint-letter" hidden></span>
      </div>
    </div>

    <div class="sil-attempts" id="sil-attempts"></div>

    <div class="dle-search-wrap">
      <div class="dle-autocomplete">
        <input class="dle-input" type="text" id="sil-input"
          placeholder="Digite o nome de um Pokémon…"
          autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <ul class="dle-suggestions" id="sil-suggestions" role="listbox" hidden></ul>
      </div>
      <button class="dle-guess-btn" id="sil-guess-btn" disabled>Chutar</button>
    </div>

    <div class="dle-status" id="sil-status" hidden></div>

    <div class="dle-actions">
      <button class="dle-new-btn" id="sil-new-btn">🔄 Próximo Pokémon</button>
    </div>

  </div><!-- /.dle-panel -->

  <footer class="footer" role="contentinfo">
    <p class="footer__text">
      Dados fornecidos pela <a href="https://pokeapi.co" target="_blank" rel="noopener noreferrer" class="footer__link">PokéAPI</a>
      &nbsp;·&nbsp; Pokémon e seus nomes são marcas registradas da Nintendo.
    </p>
  </footer>

  
  <script src="dle.js"></script>
</body>
</html>
